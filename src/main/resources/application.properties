# ======================================
# Server Configuration
# ======================================
server.port=${PORT:8080}

# ======================================
# Database Configuration
# ======================================
# spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3307/ttm_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
# spring.datasource.username=${DATABASE_USERNAME:root}
# spring.datasource.password=${DATABASE_PASSWORD:root}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3307/ttm_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-test-query=SELECT 1

# ======================================
# JPA / Hibernate Configuration
# ======================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ======================================
# JWT Configuration
# ======================================
#app.jwt.secret=${JWT_SECRET:ttmSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration}
app.jwt.secret=MySuperStrongJwtSecretKeyForTeamTaskManagerApplication2026VerySecureKey123456
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ======================================
# Application Settings
# ======================================
spring.application.name=team-task-manager
spring.jackson.serialization.fail-on-empty-beans=false

# ======================================
# CORS Settings (overridable via env)
# ======================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
